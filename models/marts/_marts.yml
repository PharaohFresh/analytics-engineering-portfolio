version: 2

models:
  - name: dim_customers
    description: "Conformed customer dimension with inline geography and lifetime order summary. Grain: one row per customer."
    columns:
      - name: customer_key
        description: "Primary key."
        tests: [not_null, unique]
      - name: gender
        tests:
          - accepted_values:
              arguments:
                values: ['M', 'F']

  - name: dim_products
    description: "Product dimension with fulfillment origin. Grain: one row per product."
    columns:
      - name: product_key
        tests: [not_null, unique]

  - name: dim_distribution_centers
    description: "Distribution center dimension. Grain: one row per center."
    columns:
      - name: distribution_center_key
        tests: [not_null, unique]

  - name: dim_dates
    description: "Date dimension derived from observed event dates. Grain: one row per calendar date."
    columns:
      - name: date_key
        tests: [not_null, unique]

  - name: fct_orders
    description: "Order fact. Grain: one row per order."
    columns:
      - name: order_key
        description: "Primary key — one row per order."
        tests: [not_null, unique]
      - name: customer_key
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_customers')
                field: customer_key

  - name: fct_order_items
    description: "Order-item fact, incremental on item_created_at. Grain: one row per order item."
    columns:
      - name: order_item_key
        description: "Primary key — natural order-item identifier. Asserts the item grain."
        tests: [not_null, unique]
      - name: order_key
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('fct_orders')
                field: order_key
      - name: product_key
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_products')
                field: product_key
      - name: customer_key
        tests: [not_null]

  - name: mart_revenue_by_segment
    description: "Revenue and order metrics by acquisition channel and country. Grain: (traffic_source, country)."
    columns:
      - name: total_revenue
        tests: [not_null]

  - name: mart_product_category_margin
    description: "Revenue, margin, and return rate by product category. Grain: (department, category)."
    columns:
      - name: total_revenue
        tests: [not_null]
