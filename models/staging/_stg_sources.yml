version: 2

sources:
  - name: thelook
    description: "Google's `bigquery-public-data.thelook_ecommerce` sample data — a synthetic DTC retail store (customers, orders, items, products, distribution centers)."
    database: bigquery-public-data
    schema: thelook_ecommerce
    # The public dataset is regenerated rather than incrementally loaded, so a
    # meaningful source-freshness SLA isn't well-defined here. On a real source I'd
    # add loaded_at_field: created_at + warn_after/error_after thresholds.
    tables:
      - name: users
      - name: orders
      - name: order_items
      - name: products
      - name: distribution_centers
