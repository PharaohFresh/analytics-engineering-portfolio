version: 2

models:
  - name: stg_orders
    description: "One row per order, renamed and typed from the orders source."
    columns:
      - name: order_key
        description: "Primary key — natural order identifier."
        tests: [not_null, unique]
      - name: customer_key
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_customers')
                field: customer_key
      - name: order_status
        tests:
          - accepted_values:
              arguments:
                values: ['Complete', 'Processing', 'Shipped', 'Cancelled', 'Returned']

  - name: stg_customers
    description: "One row per customer, with inline geography (city/state/country)."
    columns:
      - name: customer_key
        tests: [not_null, unique]

  - name: stg_order_items
    description: "One row per order line item (one physical unit). Revenue carried as sale_price."
    columns:
      - name: order_item_key
        description: "Primary key — natural order-item identifier."
        tests: [not_null, unique]
      - name: order_key
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_orders')
                field: order_key
      - name: product_key
        tests: [not_null]
      - name: customer_key
        tests: [not_null]

  - name: stg_products
    description: "One row per product. Carries cost + retail_price for margin analysis."
    columns:
      - name: product_key
        tests: [not_null, unique]

  - name: stg_distribution_centers
    description: "One row per distribution center (fulfillment origin)."
    columns:
      - name: distribution_center_key
        tests: [not_null, unique]
